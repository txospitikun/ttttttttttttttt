server:
  # portul pe care asculta registrul (poate fi suprascris prin variabila de mediu PORT)
  port: ${PORT:8761}

spring:
  application:
    name: registry-service

  # Baza de date H2 (in-memory). DB_CLOSE_DELAY=-1 o tine vie cat traieste aplicatia.
  datasource:
    url: jdbc:h2:mem:registry;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # Consola web a bazei de date, utila pentru demonstratie: http://localhost:8761/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console
